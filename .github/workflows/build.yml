name: Build and Release

on:
  push:
    branches: [main]
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        working-directory: src
        run: pyinstaller --noconfirm --onefile --windowed --icon=icon.ico --add-data "icon.ico;." --name crt-windows main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: crt-windows
          path: src/dist/crt-windows.exe
          compression-level: 0

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate .icns icon
        working-directory: src
        run: |
          python - <<'PY'
          import os
          from PIL import Image

          im = Image.open("icon.ico").convert("RGBA")
          os.makedirs("crt.iconset", exist_ok=True)
          for size in (16, 32, 128, 256, 512):
              im.resize((size, size), Image.LANCZOS).save(f"crt.iconset/icon_{size}x{size}.png")
              im.resize((size * 2, size * 2), Image.LANCZOS).save(f"crt.iconset/icon_{size}x{size}@2x.png")
          PY
          iconutil -c icns crt.iconset -o icon.icns

      - name: Build .app bundle
        working-directory: src
        run: pyinstaller --noconfirm --onefile --windowed --icon=icon.icns --add-data "icon.ico:." --name crt main.py

      - name: Build .dmg
        working-directory: src
        run: hdiutil create -volname CRT -srcfolder dist/crt.app -ov -format UDZO ../crt-macos.dmg

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: crt-macos
          path: crt-macos.dmg
          compression-level: 0

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build executable
        working-directory: src
        run: pyinstaller --noconfirm --onefile --name crt main.py

      - name: Generate icon
        working-directory: src
        run: python -c "from PIL import Image; Image.open('icon.ico').convert('RGBA').save('icon.png')"

      - name: Assemble AppDir
        working-directory: src
        run: |
          mkdir -p crt.AppDir/usr/bin
          cp dist/crt crt.AppDir/usr/bin/crt
          cp icon.png crt.AppDir/crt.png
          cat > crt.AppDir/crt.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=CRT
          Exec=crt
          Icon=crt
          Categories=Utility;
          EOF
          ln -s usr/bin/crt crt.AppDir/AppRun

      - name: Download appimagetool
        working-directory: src
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        working-directory: src
        run: ./appimagetool --appimage-extract-and-run crt.AppDir crt-linux.AppImage

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: crt-linux
          path: src/crt-linux.AppImage
          compression-level: 0

  release:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create/update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
